# Netlify config for the materiaalitukku.com rebuild (Next.js 15, App Router).
# The Netlify Next.js runtime handles SSR, server actions, middleware and the
# i18n/auth edge middleware automatically.
[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
